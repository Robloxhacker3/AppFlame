    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-color: #ff5722; 
            --accent-gradient: linear-gradient(135deg, #ff5722, #ff9100);
            --install-btn-bg: #2a2a2a;
            --install-btn-text: #ffffff;
            --tab-active: #ffffff;
            --tab-inactive: #555555;
            --border-radius: 16px;
            --nav-height: 80px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-bottom: var(--nav-height);
            overflow-x: hidden;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* --- GATEKEEPER OVERLAYS --- */
        .gatekeeper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.98);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .gate-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: var(--accent-color);
        }
        .gate-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            color: white;
        }
        .gate-desc {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 320px;
        }
        .gate-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(255, 87, 34, 0.3);
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .gate-btn:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        /* --- MAIN CONTENT HIDDEN BY DEFAULT --- */
        #appStore {
            display: none; 
        }

        /* --- iOS Status Bar Simulation --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding-top: 20px; 
        }
        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* --- Header --- */
        header {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            font-size: 24px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand svg {
            width: 28px;
            height: 28px;
            fill: url(#flameGradient);
        }

        /* --- Tabs Navigation (With Icons) --- */
        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 20px 15px 20px;
            display: flex;
            gap: 10px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--tab-inactive);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .tab-btn.active {
            background: var(--accent-gradient);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
        }

        /* --- Banners --- */
        .banners-wrapper {
            padding: 0 20px 20px 20px;
        }
        .banner-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            gap: 15px;
        }
        .banner-card {
            min-width: 100%;
            height: 180px;
            border-radius: var(--border-radius);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            flex-shrink: 0;
            scroll-snap-align: center;
        }
        .banner-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .banner-content {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 2;
        }
        .banner-title {
            font-size: 20px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .banner-sub {
            font-size: 13px;
            color: #ddd;
            font-weight: 500;
        }

        /* --- Section Header --- */
        .section-header {
            padding: 0 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }
        .section-title span {
            color: var(--accent-color);
            font-weight: 300;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 5px;
        }

        /* --- App List (2 Column Grid) --- */
        .app-list {
            padding: 0 20px 20px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px 10px;
            border-radius: 16px;
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
        }
        .app-card:active {
            transform: scale(0.96);
            background-color: #1a1a1a;
        }
        .app-icon {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            object-fit: cover;
            background-color: #222;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-info {
            width: 100%;
            margin-bottom: 12px;
        }
        .app-name {
            font-size: 14px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 34px;
        }
        .app-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .action-btn {
            width: 100%;
            background-color: var(--install-btn-bg);
            color: white;
            border: none;
            padding: 8px 0;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .action-btn:active {
            opacity: 0.7;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            padding: 10px 0 25px 0; 
            border-top: 1px solid #222;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-color);
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
            width: 60px;
        }
        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* SVG Gradient Definition */
        .svg-defs { position: absolute; width: 0; height: 0; }

    </style>
</head>

        function init() {
            checkAccess();
        }

        function checkAccess() {
            // 1. Check Standalone Mode (Home Screen)
            // Combines navigator.standalone and display-mode check for maximum compatibility
            const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

            if (!isStandalone) {
                document.getElementById('homeScreenOverlay').style.display = 'flex';
                return;
            }

            // 2. Check Discord
            const hasJoined = localStorage.getItem('discord_joined');

            if (!hasJoined) {
                document.getElementById('discordOverlay').style.display = 'flex';
            } else {
                // 3. If both pass, render app
                document.getElementById('appStore').style.display = 'block';
                renderTabs();
                renderBanners();
                renderApps(activeTab);
                startClock();
                startAutoScroll();
            }
        }

        function handleDiscordJoin() {
            const btn = document.getElementById('joinDiscordBtn');
            
            // Set state to verifying
            btn.disabled = true;
            btn.innerText = "Verifying...";

            // Wait 3 seconds then join
            setTimeout(() => {
                localStorage.setItem('discord_joined', 'true');
                window.location.href = "https://discord.gg/7UR4EWauZY";
            }, 3000);
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = appStoreData.tabs.map(tab => `
                <button class="tab-btn ${tab === activeTab ? 'active' : ''}" 
                        onclick="setTab('${tab}')">
                    <svg viewBox="0 0 24 24"><path d="${tabIcons[tab]}"/></svg>
                    ${tab}
                </button>
            `).join('');
        }

        function renderBanners() {
            const container = document.getElementById('bannerCarousel');
            container.innerHTML = appStoreData.banners.map(b => `
                <div class="banner-card" style="background-image: url('${b.image_url}')">
                    <div class="banner-overlay"></div>
                    <div class="banner-content">
                        <div class="banner-title">${b.title}</div>
                        <div class="banner-sub">${b.subtitle}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderApps(category) {
            const container = document.getElementById('appList');
            
            const filteredApps = appStoreData.apps.filter(app => {
                if (category === "Featured") return true;
                return app.category === category;
            });

            if (filteredApps.length === 0) {
                 container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#555; padding:20px;">No apps in this category.</div>`;
                 return;
            }

            container.innerHTML = filteredApps.map(app => `
                <div class="app-card">
                    <img src="${app.icon_url}" class="app-icon" alt="${app.name}">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-meta">
                            ${app.category}
                        </div>
                    </div>
                    <a href="${app.install_link}" class="action-btn">
                        GET
                    </a>
                </div>
            `).join('');
        }

        function setTab(tabName) {
            activeTab = tabName;
            renderTabs();
            renderApps(tabName);
        }

        function startAutoScroll() {
            const slider = document.getElementById('bannerCarousel');
            const count = appStoreData.banners.length;
            let currentIndex = 0;

            setInterval(() => {
                currentIndex++;
                if (currentIndex >= count) {
                    currentIndex = 0;
                }
                
                const element = slider.children[currentIndex];
                if(element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 3500); 
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            setInterval(() => {
                const now = new Date();
                const dayName = days[now.getDay()];
                const day = now.getDate();
                const month = months[now.getMonth()];
                clockEl.innerText = `${dayName} ${day} ${month}`; 
            }, 1000);
        }

        function switchNav(el, page) {
            // Home only active
        }
