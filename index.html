    <style>
        :root {
            --bg-color: #000000; /* Pure Black */
            --card-bg: #0d0d0d; /* Very Dark Grey */
            --text-primary: #ffffff;
            --text-secondary: #707070;
            --accent-color: #ff4500; 
            --accent-gradient: linear-gradient(135deg, #ff4500, #ff8c00);
            --install-gradient: linear-gradient(90deg, #1c1c1c, #2c2c2c);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-radius: 16px;
            --nav-height: 80px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-bottom: var(--nav-height);
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::-webkit-scrollbar { display: none; }

        /* --- DISCORD GATEKEEPER (Clean & Dark) --- */
        .gatekeeper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .gate-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(88, 101, 242, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        .gate-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 15px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .gate-desc {
            font-size: 15px;
            color: #888;
            margin-bottom: 40px;
            line-height: 1.5;
            max-width: 280px;
        }
        .gate-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.3);
            transition: all 0.2s;
            cursor: pointer;
        }
        .gate-btn:active {
            transform: scale(0.95);
        }

        /* --- MAIN APP --- */
        #appStore {
            display: none; 
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #appStore.visible {
            opacity: 1;
        }

        /* --- iOS Status Bar --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding-top: 25px; 
            border-bottom: 1px solid var(--border-color);
        }
        .status-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            font-size: 24px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Tabs (With SVG Icons) --- */
        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px;
            display: flex;
            gap: 12px;
            scrollbar-width: none;
            margin-bottom: 10px;
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            opacity: 0.8;
        }
        .tab-btn.active {
            background: var(--accent-gradient);
            color: white;
            border: none;
            box-shadow: 0 5px 20px rgba(255, 69, 0, 0.3);
        }
        .tab-btn.active svg {
            fill: white;
            opacity: 1;
        }

        /* --- Banners --- */
        .banners-wrapper {
            padding: 0 20px 20px 20px;
        }
        .banner-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            gap: 15px;
        }
        .banner-carousel::-webkit-scrollbar { display: none; }
        .banner-card {
            min-width: 100%;
            height: 190px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            flex-shrink: 0;
            scroll-snap-align: center;
        }
        .banner-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.1));
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .banner-content {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
        }
        .banner-title {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .banner-sub {
            font-size: 13px;
            color: #ddd;
            font-weight: 600;
        }

        /* --- Section Header --- */
        .section-header {
            padding: 0 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title {
            font-size: 22px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title span {
            color: var(--accent-color);
            font-weight: 400;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- APP LIST (2 LAYER GRID) --- */
        .app-list {
            padding: 0 20px 20px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--card-bg);
            padding: 20px 12px;
            border-radius: 16px;
            position: relative;
            transition: transform 0.2s;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .app-card:active {
            transform: scale(0.97);
            background-color: #121212;
        }
        .app-icon {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            object-fit: cover;
            background-color: #222;
            margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .app-info {
            width: 100%;
            margin-bottom: 12px;
        }
        .app-name {
            font-size: 15px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        .app-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .action-btn {
            width: 100%;
            background: var(--install-gradient);
            color: white;
            border: none;
            padding: 10px 0;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .action-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-gradient);
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(255, 69, 0, 0.4);
            z-index: 10;
            letter-spacing: 0.5px;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(30px);
            display: flex;
            justify-content: center;
            padding: 10px 0 30px 0; 
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-color);
            font-size: 10px;
            gap: 5px;
            cursor: pointer;
            width: 60px;
        }
        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

        let activeTab = "Featured";

        function init() {
            checkAccess();
        }

        function checkAccess() {
            const hasJoined = localStorage.getItem('discord_joined');

            if (hasJoined !== 'true') {
                // Show Discord Overlay
                document.getElementById('discordOverlay').style.display = 'flex';
                document.getElementById('appStore').style.display = 'none';
            } else {
                // Direct Access
                showApp();
            }
        }

        function showApp() {
            document.getElementById('discordOverlay').style.display = 'none';
            const appStore = document.getElementById('appStore');
            appStore.style.display = 'block';
            // Add class to trigger opacity transition
            setTimeout(() => appStore.classList.add('visible'), 50);
            
            renderApp();
        }

        function handleDiscordJoin() {
            const btn = document.getElementById('joinDiscordBtn');
            const txt = document.getElementById('gateText');
            
            // 1. Open Discord
            window.open("https://discord.gg/7UR4EWauZY", '_blank');
            
            // 2. Update UI
            btn.disabled = true;
            btn.style.display = 'none'; 
            txt.innerHTML = "Joining Server...<br><span style='color:#ff4500; font-size:14px'>Verifying Access</span>";

            // 3. Timer (3 seconds)
            setTimeout(() => {
                localStorage.setItem('discord_joined', 'true');
                showApp();
            }, 3000);
        }

        function renderApp() {
            renderTabs();
            renderBanners();
            renderApps(activeTab);
            startClock();
            startAutoScroll();
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            // Renders SVG paths directly
            container.innerHTML = appStoreData.tabs.map(tab => `
                <button class="tab-btn ${tab.name === activeTab ? 'active' : ''}" 
                        onclick="setTab('${tab.name}')">
                    <svg viewBox="0 0 24 24"><path d="${tab.iconPath}"/></svg>
                    ${tab.name}
                </button>
            `).join('');
        }

        function renderBanners() {
            const container = document.getElementById('bannerCarousel');
            container.innerHTML = appStoreData.banners.map(b => `
                <div class="banner-card" style="background-image: url('${b.image_url}')">
                    <div class="banner-overlay"></div>
                    <div class="banner-content">
                        <div class="banner-title">${b.title}</div>
                        <div class="banner-sub">${b.subtitle}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderApps(category) {
            const container = document.getElementById('appList');
            
            const filteredApps = appStoreData.apps.filter(app => {
                if (category === "Featured") return true;
                return app.category === category;
            });

            if (filteredApps.length === 0) {
                 container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#555; padding:20px;">No apps found.</div>`;
                 return;
            }

            container.innerHTML = filteredApps.map(app => `
                <div class="app-card">
                    ${app.badge ? `<div class="badge">${app.badge}</div>` : ''}
                    <img src="${app.icon_url}" class="app-icon" alt="${app.name}">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-meta">
                            ${app.rating}
                        </div>
                    </div>
                    <a href="${app.install_link}" class="action-btn">
                        ${app.category === "Certificate" || app.category === "DNS" ? "GET" : "INSTALL"}
                    </a>
                </div>
            `).join('');
        }

        function setTab(tabName) {
            activeTab = tabName;
            renderTabs();
            renderApps(tabName);
        }

        function startAutoScroll() {
            const slider = document.getElementById('bannerCarousel');
            const count = appStoreData.banners.length;
            let currentIndex = 0;

            setInterval(() => {
                currentIndex++;
                if (currentIndex >= count) {
                    currentIndex = 0;
                }
                
                const element = slider.children[currentIndex];
                if(element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 3500); 
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            setInterval(() => {
                const now = new Date();
                const dayName = days[now.getDay()];
                const day = now.getDate();
                const month = months[now.getMonth()];
                clockEl.innerText = `${dayName} ${day} ${month}`; 
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', init);

    </script>
