<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AppFlame - Premium IPA Store</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1c1c21;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent-color: #ff5722; /* Flame Orange */
            --accent-gradient: linear-gradient(135deg, #ff5722, #ff9100);
            --install-btn-bg: #2c2c35;
            --install-btn-text: #ffffff;
            --tab-active: #ffffff;
            --tab-inactive: #8e8e93;
            --border-radius: 14px;
            --nav-height: 80px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-bottom: var(--nav-height);
            overflow-x: hidden;
        }

        /* --- iOS Status Bar Simulation --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(15, 15, 18, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* --- Header --- */
        header {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand svg {
            width: 28px;
            height: 28px;
            fill: url(#flameGradient);
        }

        /* --- Tabs Navigation --- */
        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 20px 10px 20px;
            display: flex;
            gap: 12px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--tab-inactive);
            font-size: 15px;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 20px;
            background-color: var(--card-bg);
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .tab-btn.active {
            background-color: var(--accent-gradient);
            color: white;
        }

        /* --- Banners Section (Auto Scroll) --- */
        .banners-wrapper {
            padding: 0 20px;
            margin-bottom: 15px;
        }
        .banner-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            gap: 15px;
        }
        .banner-carousel::-webkit-scrollbar {
            display: none;
        }
        .banner-card {
            min-width: 100%;
            height: 180px;
            border-radius: var(--border-radius);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-shrink: 0;
            scroll-snap-align: center;
        }
        .banner-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .banner-content {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 2;
        }
        .banner-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        .banner-sub {
            font-size: 12px;
            color: #ccc;
        }

        /* --- Section Header --- */
        .section-header {
            padding: 5px 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
        }
        .section-title span {
            color: var(--accent-color);
            font-weight: 300;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 5px;
        }

        /* --- App List --- */
        .app-list {
            padding: 0 20px 20px 20px;
            display: grid;
            gap: 12px;
        }
        .app-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            transition: transform 0.1s;
        }
        .app-card:active {
            transform: scale(0.98);
        }
        .app-icon {
            width: 55px;
            height: 55px;
            border-radius: 11px;
            object-fit: cover;
            background-color: #333;
            margin-right: 12px;
        }
        .app-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .app-name {
            font-size: 15px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }
        .app-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .action-btn {
            background-color: var(--install-btn-bg);
            color: var(--install-btn-text);
            border: none;
            padding: 7px 18px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:active {
            opacity: 0.7;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(28, 28, 33, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            padding: 12px 0 25px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-color);
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
            width: 60px;
        }
        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* SVG Gradient Definition */
        .svg-defs { position: absolute; width: 0; height: 0; }

    </style>
</head>

        let activeTab = "Featured";

        function init() {
            renderTabs();
            renderBanners();
            renderApps(activeTab);
            startClock();
            startAutoScroll();
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = appStoreData.tabs.map(tab => `
                <button class="tab-btn ${tab === activeTab ? 'active' : ''}" 
                        onclick="setTab('${tab}')">
                    ${tab}
                </button>
            `).join('');
        }

        function renderBanners() {
            const container = document.getElementById('bannerCarousel');
            container.innerHTML = appStoreData.banners.map(b => `
                <div class="banner-card" style="background-image: url('${b.image_url}')">
                    <div class="banner-overlay"></div>
                    <div class="banner-content">
                        <div class="banner-title">${b.title}</div>
                        <div class="banner-sub">${b.subtitle}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderApps(category) {
            const container = document.getElementById('appList');
            
            // Filter apps based on tab
            const filteredApps = appStoreData.apps.filter(app => {
                if (category === "Featured") return true; // Show all on Featured
                return app.category === category;
            });

            container.innerHTML = filteredApps.map(app => `
                <div class="app-card">
                    <img src="${app.icon_url}" class="app-icon" alt="${app.name}">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-meta">
                            <span>${app.category}</span> • 
                            <span>GET</span>
                        </div>
                    </div>
                    <a href="${app.install_link}" class="action-btn">
                        Install
                    </a>
                </div>
            `).join('');
        }

        function setTab(tabName) {
            activeTab = tabName;
            renderTabs();
            renderApps(tabName);
        }

        function startAutoScroll() {
            const slider = document.getElementById('bannerCarousel');
            const count = appStoreData.banners.length;
            let currentIndex = 0;

            setInterval(() => {
                currentIndex++;
                if (currentIndex >= count) {
                    currentIndex = 0;
                }
                
                const element = slider.children[currentIndex];
                if(element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 3500); 
        }

        function startClock() {
            const clockEl = document.getElementById('clock');
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            setInterval(() => {
                const now = new Date();
                const dayName = days[now.getDay()];
                const day = now.getDate();
                const month = months[now.getMonth()];
                clockEl.innerText = `${dayName} ${day} ${month}`; 
            }, 1000);
        }

        function switchNav(el, page) {
            // Only Home exists now, so logic is simplified
        }

        // Start the app
        window.addEventListener('DOMContentLoaded', init);
